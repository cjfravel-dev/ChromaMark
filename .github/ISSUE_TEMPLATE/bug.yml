name: Bug report
description: Report reproducible incorrect behavior in ChromaMark
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Security vulnerabilities belong in a private report:
        https://github.com/cjfravel-dev/ChromaMark/security/advisories/new
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@chromamark/renderer"
        - "@chromamark/cli"
        - "@chromamark/conformance"
        - "chromamark (Python)"
        - "ChromaMark for VS Code"
        - "Specification or documentation"
        - "Playground or website"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Include the package version, extension version, or commit.
      placeholder: "0.4.1"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest ChromaMark input and commands needed to reproduce the problem.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the runtime, operating system, browser, or editor when relevant.

