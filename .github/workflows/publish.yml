name: Publish

# Publishes the chromamark Python package to PyPI when a GitHub Release is
# published, using Trusted Publishing (OIDC — no API token or secret needed).
#
# npm publishing (@chromamark/renderer and @chromamark/cli) is intentionally
# omitted for now; it will be re-added with npm Trusted Publishing.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        working-directory: packages/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          skip-existing: true
