name: Publish

# Publishes ChromaMark packages when a GitHub Release is published, using
# Trusted Publishing (OIDC) — no API tokens or secrets:
#   - @chromamark/renderer and @chromamark/cli to npm  (environment: npm)
#   - chromamark to PyPI                               (environment: pypi)

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # Trusted Publishing (OIDC) — no token needed
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Use an npm that supports OIDC Trusted Publishing (>= 11.5.1)
        run: npm install -g "npm@^11.5.1"
      - run: npm ci --no-audit --no-fund
      - run: npm test --workspace @chromamark/renderer
      - run: npm test --workspace @chromamark/cli
      - name: Publish npm packages (skips versions already on the registry)
        run: |
          for pkg in @chromamark/renderer @chromamark/cli; do
            dir="packages/${pkg#@chromamark/}"
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$pkg@$ver" version >/dev/null 2>&1; then
              echo "$pkg@$ver already on npm — skipping."
            else
              npm publish --workspace "$pkg"
            fi
          done

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        working-directory: packages/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          skip-existing: true
