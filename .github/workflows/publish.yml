name: Publish

# Publishes ChromaMark packages when a GitHub Release is published:
#   - @chromamark/renderer and @chromamark/cli to npm (needs NPM_TOKEN)
#   - chromamark to PyPI via Trusted Publishing (OIDC — no token/secret needed)
# npm provenance and PyPI OIDC both use the id-token permission below.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npm test --workspace @chromamark/renderer
      - run: npm publish --provenance --workspace @chromamark/renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --provenance --workspace @chromamark/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        working-directory: packages/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          skip-existing: true
