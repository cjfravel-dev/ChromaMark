name: Pages

# Builds the ChromaMark site (playground + rendered docs) and deploys it to
# GitHub Pages. Manual-only: run it from the Actions tab (or `gh workflow run
# Pages`) after enabling Pages (Settings → Pages → Source: GitHub Actions).
# CI validates that the site builds on every push (see ci.yml).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run build --workspace @chromamark/renderer
      - run: node scripts/build-site.mjs _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
